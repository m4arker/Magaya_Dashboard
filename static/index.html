<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>JDL Cargo Analytics</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <style>
    :root {
      --bg: #020617;
      --bg-card: #020617;
      --accent: #2563eb;
      --border: #1f2937;
      --text: #e5e7eb;
      --text-muted: #9ca3af;
      --footer-bg: #020617;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: radial-gradient(circle at top, #0b1120 0, #000 55%, #000 100%);
      color: var(--text);
    }

    a { color: inherit; text-decoration: none; }

    .nav {
      background: #020617;
      border-bottom: 1px solid #1f2937;
      padding: 10px 32px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .nav-left { display: flex; align-items: center; gap: 10px; }

    .nav-logo-circle {
      width: 32px;
      height: 32px;
      border-radius: 999px;
      background: linear-gradient(135deg, #2563eb, #22c55e);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 0.8rem;
      font-weight: 600;
      color: #f9fafb;
    }

    .nav-title { display: flex; flex-direction: column; }
    .nav-title span:first-child { font-size: 0.95rem; font-weight: 600; letter-spacing: 0.03em; }
    .nav-title span:last-child { font-size: 0.75rem; color: var(--text-muted); }

    .nav-links { display: flex; align-items: center; gap: 16px; font-size: 0.85rem; color: var(--text-muted); }
    .nav-link { padding: 4px 8px; border-radius: 999px; border: 1px solid transparent; }
    .nav-link.active { color: #bfdbfe; border-color: rgba(37, 99, 235, 0.4); background: rgba(15, 23, 42, 0.8); }

    .shell { max-width: 1200px; margin: 0 auto; padding: 24px 20px 32px; }

    .hero {
      display: grid;
      grid-template-columns: minmax(0, 2fr) minmax(0, 1.4fr);
      gap: 20px;
      margin-bottom: 24px;
    }

    @media (max-width: 960px) {
      .hero { grid-template-columns: minmax(0, 1fr); }
    }

    .hero-text h1 { margin: 0 0 6px; font-size: 1.7rem; letter-spacing: 0.02em; }
    .hero-text p { margin: 0 0 10px; font-size: 0.9rem; color: var(--text-muted); }

    .hero-badges {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-top: 4px;
      font-size: 0.78rem;
    }

    .badge-pill {
      padding: 4px 10px;
      border-radius: 999px;
      border: 1px solid rgba(148, 163, 184, 0.3);
      background: rgba(15, 23, 42, 0.9);
      color: var(--text-muted);
      display: inline-flex;
      align-items: center;
      gap: 6px;
    }

    .badge-dot {
      width: 7px;
      height: 7px;
      border-radius: 999px;
      background: #22c55e;
      box-shadow: 0 0 6px rgba(34, 197, 94, 0.9);
    }

    .hero-cta-row { margin-top: 12px; display: flex; flex-wrap: wrap; gap: 10px; align-items: center; }

    .btn-primary {
      padding: 6px 14px;
      border-radius: 999px;
      border: none;
      background: #2563eb;
      color: #f9fafb;
      font-size: 0.85rem;
      cursor: pointer;
    }

    .btn-ghost {
      padding: 6px 12px;
      border-radius: 999px;
      border: 1px solid #4b5563;
      background: transparent;
      color: var(--text-muted);
      font-size: 0.8rem;
      cursor: pointer;
    }

    .hero-panel {
      border-radius: 16px;
      border: 1px solid var(--border);
      background:
        radial-gradient(circle at top left, rgba(37, 99, 235, 0.2), transparent 60%),
        radial-gradient(circle at bottom right, rgba(16, 185, 129, 0.15), transparent 60%),
        var(--bg-card);
      padding: 12px 12px 8px;
      box-shadow: 0 18px 45px rgba(0, 0, 0, 0.7);
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .hero-panel h2 { margin: 0; font-size: 0.95rem; }
    .hero-panel p { margin: 0; font-size: 0.8rem; color: var(--text-muted); }

    .hero-panel-metrics {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 8px;
      margin-top: 8px;
    }

    .metric {
      padding: 6px 8px;
      border-radius: 10px;
      border: 1px solid rgba(31, 41, 55, 0.9);
      background: rgba(15, 23, 42, 0.9);
      font-size: 0.8rem;
    }

    .metric-label { color: var(--)}
